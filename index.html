<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Task Manager</title>
  
  <style>
    /* التنسيق الأول (الأساسي) */
    body { font-family: Arial; background: #f5f5f5; text-align: center; }
    .container { background: white; padding: 20px; width: 300px; margin: 50px auto; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    input { padding: 10px; width: 70%; border: 1px solid #ccc; border-radius: 5px; }
    button#addBtn { padding: 10px; cursor: pointer; }
    ul { padding: 0; }
    li { list-style: none; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 5px; border-bottom: 1px solid #eee; }
    .done { text-decoration: line-through; color: gray; }
  </style>
</head>
<body>

<div class="container">
  <h2>Task Manager</h2>
  <input type="text" id="taskInput" placeholder="Enter task">
  <button id="addBtn" onclick="addTask()">Add</button>
  <ul id="taskList"></ul>
</div>

<script>
  // [المقطع 3]: دالة الإضافة مع الوقت
  function addTask() {
    let input = document.getElementById("taskInput");
    let taskText = input.value;
    if (taskText === "") return;

    let time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    
    let li = document.createElement("li");
    // تصحيح علامات الاقتباس هنا لضمان عمل المتغيرات
    li.innerHTML = `<span onclick="toggleTask(this)">${taskText} <small style="color:gray;">(${time})</small></span>
                    <button onclick="deleteTask(this)" style="color:red; border:none; background:none; cursor:pointer;">Delete</button>`;

    document.getElementById("taskList").appendChild(li);
    input.value = "";
    saveToLocal(); // حفظ بعد الإضافة
  }

  function deleteTask(button) { 
    button.parentElement.remove(); 
    saveToLocal(); // حفظ بعد الحذف
  }

  function toggleTask(span) { 
    span.classList.toggle("done"); 
    saveToLocal(); // حفظ بعد التغيير
  }

  // [المقطع 4]: كود مطور البيانات (الحفظ التلقائي)
  function saveToLocal() {
    let tasks = [];
    document.querySelectorAll("#taskList li span").forEach(span => {
      tasks.push({ 
        text: span.innerHTML, 
        done: span.classList.contains("done") 
      });
    });
    localStorage.setItem("myTasks", JSON.stringify(tasks));
  }

  // استرجاع البيانات عند تحميل الصفحة
  window.onload = function() {
    let savedTasks = JSON.parse(localStorage.getItem("myTasks") || "[]");
    savedTasks.forEach(task => {
      let li = document.createElement("li");
      li.innerHTML = `<span class="${task.done ? 'done' : ''}" onclick="toggleTask(this)">${task.text}</span>
                      <button onclick="deleteTask(this)" style="color:red; border:none; background:none; cursor:pointer;">Delete</button>`;
      document.getElementById("taskList").appendChild(li);
    });
  };
</script>

</body>
</html>
